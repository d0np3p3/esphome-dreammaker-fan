# DM Fan ESPHome Configuration
# v3.0.0-beta — 3-stage WiFi handshake (non-blocking)

substitutions:
  device_name: dreammaker-fan
  friendly_name: "Dream Maker Fan"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Zeico / Dream Maker Smart Fan — Native UART, no cloud"
  min_version: "2026.4.5"
  project:
    name: "d0np3p3.dreammaker-fan"
    version: "3.0.0-beta"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: !secret wifi_ap_password

captive_portal:

# ── External component ────────────────────────────────────────────────────────
external_components:
  - source:
      type: git
      url: https://github.com/d0np3p3/esphome-dreammaker-fan
      ref: v3.0.0-beta
    components: [dm_fan]
  # Local (for testing):
  # - source:
  #     type: local
  #     path: components
  #   components: [dm_fan]

# ── UART ─────────────────────────────────────────────────────────────────────
uart:
  id: uart_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 19200  # confirmed from hardware test 2026-05-23

# ── Fan: Power / Speed 1-100% / Oscillation ──────────────────────────────────
fan:
  - platform: dm_fan
    id: my_fan
    name: "DM Fan"
    uart_id: uart_bus
    temperature:
      name: "Temperatur"
      entity_category: diagnostic
    humidity:
      name: "Luftfeuchtigkeit"
      entity_category: diagnostic

# ── Selects: Mode + Angle ─────────────────────────────────────────────────────
select:
  - platform: template
    name: "Modus"
    icon: "mdi:leaf"
    optimistic: true
    initial_option: "Direct Breeze"
    options:
      - "Direct Breeze"
      - "Natural Breeze"
      - "Smart Breeze"
    set_action:
      lambda: |-
        uint8_t mode = 0;
        if (x == "Natural Breeze") mode = 1;
        if (x == "Smart Breeze")   mode = 2;
        id(my_fan)->set_mode(mode);

  - platform: template
    name: "Oszillationswinkel"
    icon: "mdi:angle-obtuse"
    entity_category: config
    optimistic: true
    initial_option: "90°"
    options:
      - "30°"
      - "60°"
      - "90°"
      - "120°"
      - "140°"
    set_action:
      lambda: |-
        int deg = 90;
        if (x == "30°")  deg = 30;
        if (x == "60°")  deg = 60;
        if (x == "90°")  deg = 90;
        if (x == "120°") deg = 120;
        if (x == "140°") deg = 140;
        id(my_fan)->set_roll_angle(deg);

# ── Timer 0-8h ────────────────────────────────────────────────────────────────
number:
  - platform: template
    name: "Timer (Stunden)"
    icon: "mdi:timer-outline"
    min_value: 0
    max_value: 8
    step: 1
    entity_category: config
    optimistic: true
    set_action:
      lambda: "id(my_fan)->set_timer_hours(x);"

# ── Switches: Child lock / LED / Sound ───────────────────────────────────────
switch:
  - platform: template
    name: "Kindersicherung"
    icon: "mdi:baby-carriage"
    entity_category: config
    optimistic: true
    turn_on_action:  { lambda: "id(my_fan)->set_child_lock(true);" }
    turn_off_action: { lambda: "id(my_fan)->set_child_lock(false);" }

  - platform: template
    name: "LED Anzeige"
    icon: "mdi:led-on"
    entity_category: config
    optimistic: true
    turn_on_action:  { lambda: "id(my_fan)->set_led(true);" }
    turn_off_action: { lambda: "id(my_fan)->set_led(false);" }

  - platform: template
    name: "Tastentöne"
    icon: "mdi:volume-high"
    entity_category: config
    optimistic: true
    turn_on_action:  { lambda: "id(my_fan)->set_sound(true);" }
    turn_off_action: { lambda: "id(my_fan)->set_sound(false);" }

# ── Buttons: Rotate left / right ─────────────────────────────────────────────
button:
  - platform: template
    name: "Nach Links drehen"
    icon: "mdi:pan-left"
    on_press:
      lambda: "id(my_fan)->rotate_left();"

  - platform: template
    name: "Nach Rechts drehen"
    icon: "mdi:pan-right"
    on_press:
      lambda: "id(my_fan)->rotate_right();"
