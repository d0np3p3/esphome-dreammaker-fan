# dm_fan.yaml - Final für dein Repository
esphome:
  name: dreammaker-fan
  friendly_name: Dream Maker Fan
  comment: "Zeico / Dream Maker Smart Fan"
  project:
    name: "d0np3p3.esphome-dreammaker-fan"
    version: "1.0.0"

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_FREERTOS_UNICORE: y
    advanced:
      ignore_efuse_custom_mac: true
      ignore_efuse_mac_crc: true

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Dreammaker-Fan Hotspot"
    password: !secret wifi_ap_password

captive_portal:

external_components:
  - source:
      type: git
      url: https://github.com/d0np3p3/esphome-dreammaker-fan
    components: [ dm_fan ]

uart:
  id: uart_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600

fan:
  - platform: dm_fan
    id: my_fan
    name: "DM Fan"
    uart_id: uart_bus
    temperature:
      name: "Temperatur"
    humidity:
      name: "Luftfeuchtigkeit"
    # Optional für spätere Erweiterung:
    # oscillation_angle:
    #   name: "Oszillations-Winkel"

switch:
  - platform: template
    name: "Kindersicherung"
    icon: "mdi:baby-carriage"
    lambda: |-
      return id(my_fan).get_child_lock();
    turn_on_action:
      - lambda: 'id(my_fan).set_child_lock(true);'
    turn_off_action:
      - lambda: 'id(my_fan).set_child_lock(false);'

  - platform: template
    name: "LED Anzeige"
    icon: "mdi:led-on"
    lambda: |-
      return id(my_fan).get_lights();
    turn_on_action:
      - lambda: 'id(my_fan).set_lights(true);'
    turn_off_action:
      - lambda: 'id(my_fan).set_lights(false);'

  - platform: template
    name: "Tastentöne"
    icon: "mdi:volume-high"
    lambda: |-
      return id(my_fan).get_sounds();
    turn_on_action:
      - lambda: 'id(my_fan).set_sounds(true);'
    turn_off_action:
      - lambda: 'id(my_fan).set_sounds(false);'

number:
  - platform: template
    name: "Timer (Stunden)"
    min_value: 0
    max_value: 4
    step: 0.5  # Jetzt korrekt auf halbe Stunden eingestellt
    set_action:
      - lambda: 'id(my_fan).set_timer(x);'
